<!DOCTYPE html>
<html>
<head>
  <title>Rajdhani Code</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f5f5f5;
    }

    .box {
      text-align: center;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0px 5px 20px rgba(0,0,0,0.2);
    }

    img {
      width: 200px;
      margin-bottom: 15px;
    }

    input {
      padding: 10px;
      font-size: 16px;
      width: 150px;
      text-align: center;
    }

    button {
      padding: 10px 20px;
      margin-top: 10px;
      background: red;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>

</head>

<body>

<div class="box">
  <img src="logo.png">

  <h3>Enter Code</h3>

  <input type="text" id="code" maxlength="2">
  <br>
  <button onclick="goNext()">Submit</button>
</div>

<script>
function goNext(){
  var code = document.getElementById("code").value.toUpperCase();
  window.location.href = "result.html?code=" + code;
}
</script>

</body>
</html>
