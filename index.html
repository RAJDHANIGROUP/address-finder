<!DOCTYPE html>
<html>
<head>
  <title>Address Finder</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Segoe UI',sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      background:linear-gradient(
      135deg,
      #ff4b2b,
      #ff416c,
      #ff9f43
      );
    }

    .box{
      position:relative;
      text-align:center;
      background:white;
      padding:40px;
      border-radius:20px;
      width:380px;
      box-shadow:0 10px 35px rgba(0,0,0,.25);
    }

    .animated-title{
    font-size:42px;
    font-weight:900;
    margin-bottom:25px;
    letter-spacing:2px;

    background:linear-gradient(
        90deg,
        #ff0000,
        #ff9900,
        #ffff00,
        #ff0000
    );

    background-size:400% 400%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    animation:rainbow 4s linear infinite,
              zoomText 2s ease-in-out infinite;
}

@keyframes rainbow{
    0%{
        background-position:0% 50%;
    }
    100%{
        background-position:100% 50%;
    }
}

@keyframes zoomText{
    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.08);
    }

    100%{
        transform:scale(1);
    }
}

    .creator{
    position:fixed;
    bottom:12px;
    right:15px;
    font-size:10px;
    color:#ffffff;
    text-align:right;
    line-height:1.2;
    opacity:0.8;
}

.creator span{
    color:#ffffff;
    font-weight:bold;
    display:block;
    letter-spacing:1px;
}

    h3{
      color:#333;
      margin-bottom:15px;
    }

    input{
      width:220px;
      padding:12px;
      border:2px solid #ddd;
      border-radius:10px;
      text-align:center;
      font-size:16px;
      outline:none;
    }

    input:focus{
      border-color:#ff416c;
    }

    button{
      margin-top:15px;
      padding:12px 25px;
      border:none;
      border-radius:10px;
      background:#ff3c2b;
      color:white;
      font-size:15px;
      cursor:pointer;
      transition:.3s;
    }

    button:hover{
      transform:translateY(-2px);
      background:#e62e1b;
    }

    .footer{
      margin-top:18px;
      color:#888;
      font-size:12px;
    }

  </style>

</head>

<body>

<div class="box">

  <div class="creator">
      Created By
      <span>BABA ZONE AI</span>
  </div>

  <h1 class="animated-title">
      ADDRESS FINDER
  </h1>

  <h3>Enter Code</h3>

  <input
      type="text"
      id="code"
      maxlength="2"
      placeholder="Enter Code">

  <br>

  <button onclick="goNext()">
      Search Address
  </button>

  <div class="footer">
      Enter your code to view address details
  </div>

</div>

<script>

function goNext(){

    var code =
    document
    .getElementById("code")
    .value
    .toUpperCase();

    window.location.href =
    "result.html?code=" + code;

}

</script>

</body>
</html>
