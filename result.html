<!DOCTYPE html>
<html>
<head>
  <title>Address Details</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: url('background.png') no-repeat center center/cover;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: rgba(255,255,255,0.95);
      padding: 30px;
      border-radius: 20px;
      width: 90%;
      max-width: 500px;
      text-align: center;
      box-shadow: 0px 10px 40px rgba(0,0,0,0.3);
    }

    .logo {
      width: 170px;
      margin-bottom: 10px;
    }

    h2 {
      color: #b30000;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .code-box {
      display: inline-block;
      background: #ff3c2b;
      color: white;
      padding: 8px 20px;
      border-radius: 8px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .address-box {
      margin-top: 10px;
      font-size: 16px;
      line-height: 1.6;
      color: #222;
      text-align: center;
    }

    .divider {
      margin: 15px 0;
      border-top: 1px solid #ddd;
    }

    .fssai-logo {
      width: 120px;
      margin-top: 10px;
    }

    .license {
      font-weight: bold;
      color: #b30000;
      margin-top: 5px;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
    }

    .map-btn {
      background: #1e7e34;
      color: white;
    }

    .back-btn {
      background: #ff3c2b;
      color: white;
      margin-left: 10px;
    }

  </style>

</head>

<body>

<div class="card">

  <img src="logo.png" class="logo">

  <h2>ADDRESS DETAILS</h2>

  <div class="code-box" id="codeBox"></div>

  <div class="address-box" id="addressBox"></div>

  <div class="divider"></div>

  <!-- FSSAI LOGO -->
  <img src="fssai.png" class="fssai-logo">

  <div class="license" id="licenseBox"></div>

  <button class="btn map-btn" onclick="openMap()">📍 Open in Google Maps</button>
  <button class="btn back-btn" onclick="goBack()">⬅ Back</button>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const code = params.get("code");

let data = {
  "VD": {
    address: "Victoria Foods Pvt. Ltd.<br>B-32, Lawrence Road Industrial Area,<br>New Delhi - 110035, INDIA",
    license: "Lic No: 10012011000176"
  },
  "VK": {
    address: "Victoria Foods Pvt. Ltd.<br>Janti Road, Kundli,<br>Sonipat, Haryana - 131028, INDIA",
    license: "Lic No: 10814020000004"
  },
  "VJ": {
    address: "Victoria Foods Pvt. Ltd.<br>MIDC, Jalgaon,<br>Maharashtra - 425003, INDIA",
    license: "Lic No: 11519031000029"
  },
  "R1": {
    address: "Victoria Foods Pvt. Ltd.<br>Foods Park Phase-2,<br>Rai, Sonipat - 131029 (HR), INDIA",
    license: "Lic No: 10014064000464"
  },
  "R2": {
    address: "Victoria Foods Pvt. Ltd.<br>Foods Park,<br>Sonipat - 131029, INDIA",
    license: "Lic No: 10822020000163"
  },
  "RE": {
    address: "RAAR ENTERPRISES<br>HSIDC Rai Industrial Area,<br>Sonipat (Haryana) - 131029, INDIA",
    license: "Lic No: 10019064001917"
  }
};

if(data[code]) {
  document.getElementById("codeBox").innerText = "Code: " + code;
  document.getElementById("addressBox").innerHTML = data[code].address;
  document.getElementById("licenseBox").innerText = data[code].license;
  window.currentAddress = data[code].address.replace(/<br>/g, " ");
} else {
  document.getElementById("addressBox").innerText = "❌ Invalid Code";
}

function openMap() {
  let mapUrl = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(window.currentAddress);
  window.open(mapUrl, "_blank");
}

function goBack() {
  window.location.href = "index.html";
}

</script>

</body>
</html>
